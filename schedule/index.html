<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>소라 · 방송 일정</title>
<link rel="icon" type="image/jpeg" href="https://profile.img.sooplive.co.kr/LOGO/so/soraneko/soraneko.jpg">
<meta property="og:title" content="소라 · 방송 일정">
<meta property="og:image" content="https://profile.img.sooplive.co.kr/LOGO/so/soraneko/soraneko.jpg">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  /* 밤(기본) */
  --bg: radial-gradient(130% 120% at 50% 18%, #232a5e 0%, #161a40 48%, #0c0e26 100%);
  --text:#e7e9f7; --text-soft:#9aa0c8;
  --heading:#aeb8f0; --main:#5b7fe0;
  --ornament:#cfd6f5; --line:rgba(186,196,240,.32);
  --frame:rgba(220,226,250,.8); --mat:rgba(232,236,252,.06); --catframe:rgba(190,200,242,.5);
  --seal:#c0392b; --sakura:#d9a9e0;
  --katuri:'Noto Serif KR',serif; --pen:'Noto Sans KR',sans-serif;
}
body.day{
  --bg: radial-gradient(130% 120% at 50% 12%, #faf6ee 0%, #f1ebdd 55%, #e7dfcd 100%);
  --text:#2a2e44; --text-soft:#7c7f97;
  --heading:#2b3a8c; --main:#3a4aa0;
  --ornament:#34428f; --line:rgba(43,58,140,.28);
  --frame:rgba(43,58,140,.55); --mat:rgba(43,58,140,.05); --catframe:rgba(43,58,140,.42);
  --seal:#c0392b; --sakura:#bb6a9c;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{font-family:var(--pen); color:var(--text); background:var(--bg); background-attachment:fixed;
  -webkit-font-smoothing:antialiased; overflow-x:hidden; transition:color .25s;}
.brush{font-family:var(--katuri); font-weight:800;}

/* ── 장식 프레임 (네 모서리 구름·옥패 / 상하 띠 / 구름결) ── */
.frame{position:fixed; inset:0; pointer-events:none; z-index:1;}
.orn{position:absolute; filter:drop-shadow(0 0 7px rgba(120,150,240,.30)); opacity:.95;}
body.day .orn{filter:brightness(.34) drop-shadow(0 1px 2px rgba(43,58,140,.18)); opacity:.82;}
.orn img,img.orn{display:block;}
.ro-tl{top:6px; left:6px; width:clamp(84px,11.5vw,168px);}
.ro-tr{top:6px; right:6px; width:clamp(84px,11.5vw,160px);}
.band{position:absolute; left:50%; transform:translateX(-50%); display:flex; align-items:center; gap:10px; opacity:.85;
  background:linear-gradient(var(--line),var(--line)) center/100% 1px no-repeat; padding:0 10px;
  -webkit-mask-image:linear-gradient(90deg,transparent,#000 11%,#000 89%,transparent); mask-image:linear-gradient(90deg,transparent,#000 11%,#000 89%,transparent);}
.band-top{top:clamp(16px,2.2vw,28px);} .band-bot{bottom:clamp(16px,2.2vw,28px);}
.band i{width:7px; height:7px; border:1.4px solid var(--ornament); transform:rotate(45deg); position:relative; background:transparent;}
.band i::after{content:''; position:absolute; inset:1.6px; background:var(--ornament); border-radius:1px;}
.ro-bl{bottom:4px; left:4px; width:clamp(96px,12vw,176px); opacity:.8; -webkit-mask-image:radial-gradient(135% 135% at 0% 100%,#000 30%,transparent 74%); mask-image:radial-gradient(135% 135% at 0% 100%,#000 30%,transparent 74%);}
.ro-br{bottom:4px; right:4px; width:clamp(96px,12vw,176px); opacity:.8; -webkit-mask-image:radial-gradient(135% 135% at 100% 100%,#000 30%,transparent 74%); mask-image:radial-gradient(135% 135% at 100% 100%,#000 30%,transparent 74%);}
.mist{position:fixed; left:0; right:0; top:46%; opacity:.10; z-index:0; pointer-events:none;}

/* ── 본문 (가운데 정렬, 한 화면) ── */
.wrap{position:relative; z-index:2; min-height:100vh; max-width:1200px; margin:0 auto;
  display:flex; flex-direction:column; padding:clamp(40px,5.5vh,64px) clamp(54px,7vw,104px) clamp(40px,5.5vh,60px);
  opacity:0; transition:opacity .5s ease;}
body.ready .wrap{opacity:1;}
.wrap.fx-enter{opacity:1; transition:none;}

/* 얇은 상단 바: 프사·로고 + 메뉴 + 문의 + 다크 */
.nav{display:flex; align-items:center; gap:12px; flex-wrap:wrap; padding-bottom:6px; position:relative;}
.brandwrap{display:flex; align-items:center; gap:10px; margin-right:auto;}
.av-host{position:relative; width:44px; height:44px; border-radius:50%; overflow:hidden; flex-shrink:0;
  border:1px solid var(--frame); box-shadow:0 0 12px rgba(120,150,240,.3);}
.av{position:absolute; inset:0;}
.av .av-img{width:100%; height:100%; object-fit:cover; display:none;}
.av .av-fb{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:linear-gradient(160deg,#2a316a,#161a40);}
.av .av-fb img{width:80%; height:80%; object-fit:contain;}
.nav-logo{font-family:var(--katuri); font-size:30px !important; font-weight:900; color:var(--text) !important; text-decoration:none; letter-spacing:2px; line-height:1;}
.menu{display:flex; gap:2px; flex-wrap:nowrap; white-space:nowrap; position:absolute; left:50%; transform:translateX(-50%);}
.menu a{padding:7px 13px; font-size:15px; font-weight:500; color:var(--text-soft); text-decoration:none; border-radius:8px; transition:.16s; letter-spacing:.02em;}
.menu a:hover,.menu a.active{color:var(--text); background:rgba(150,165,240,.14);}
body.day .menu a:hover,body.day .menu a.active{background:rgba(43,58,140,.1);}
.ctrls{display:flex; align-items:center; gap:10px; margin-left:auto;}
.iq-open{background:transparent; color:var(--heading); border:1px solid var(--line); border-radius:999px; padding:8px 16px; font-size:13px; font-weight:600; cursor:pointer; transition:.18s; font-family:inherit;}
.iq-open:hover{background:rgba(150,165,240,.12); border-color:var(--main);}
.theme-switch{flex-shrink:0; width:22px; height:33px; border-radius:999px; border:1px solid var(--line); background:transparent; cursor:pointer; padding:0; position:relative;}
.theme-switch .theme-knob{position:absolute; left:1.5px; top:1.5px; width:16px; height:16px; border-radius:50%; background:rgba(255,255,255,.85); display:flex; align-items:center; justify-content:center; font-size:9px; transition:top .2s; box-shadow:0 1px 4px rgba(0,0,0,.3);}
body:not(.day) .theme-switch .theme-knob{top:14px; background:#1a1f44;}

/* 메인 그리드: 좌 텍스트 | 세로 구분선 | 우 액자 */
.grid{flex:1; display:grid; grid-template-columns:minmax(0,1fr) auto minmax(0,1fr); align-items:start; align-content:center; gap:clamp(26px,3.4vw,50px); padding-top:clamp(18px,3vh,30px);}
/* 고양이 프레임 (왼쪽) */
.col-text{position:relative; border:1.6px solid var(--catframe); border-radius:24px; padding:30px 28px 32px; background:rgba(255,255,255,.012);}
.catfx{position:absolute; pointer-events:none; filter:drop-shadow(0 0 5px rgba(120,150,240,.25));}
body.day .catfx{filter:none;}
.logo-head{display:flex; align-items:center; gap:clamp(12px,1.4vw,18px); padding-bottom:clamp(6px,.8vw,11px); border-bottom:1px solid var(--line);}
.head-av.av-host{width:clamp(50px,5vw,66px); height:auto; aspect-ratio:1; border-width:1.5px; box-shadow:0 0 16px rgba(120,150,240,.3);}
body.day .head-av.av-host{box-shadow:0 6px 18px rgba(43,58,140,.16);}
.head-names{display:flex; flex-direction:column; gap:4px;}
.head-name{font-family:var(--katuri); font-size:clamp(30px,3.6vw,46px); font-weight:900; color:var(--text); letter-spacing:3px; line-height:1;}
.head-sub{font-size:clamp(11px,.9vw,13px); letter-spacing:4px; color:var(--text-soft); font-weight:700;}

/* 대시보드 레이아웃 */
.col-left{display:flex; flex-direction:column; gap:clamp(16px,2vw,24px);}
.hero-frame{margin:0; border-radius:16px; overflow:hidden; border:1.5px solid var(--frame); box-shadow:0 12px 30px rgba(0,0,0,.4);}
.hero-frame img{display:block; width:100%; height:auto;}
body.day .hero-frame{box-shadow:0 12px 28px rgba(43,58,140,.18);}
.sched-box{border:1.5px solid var(--catframe); border-radius:16px; padding:clamp(13px,1.5vw,18px); background:rgba(255,255,255,.02);}
.sched-head{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:12px;}
.sched-title{font-size:clamp(16px,1.5vw,19px);}
.sched-month{font-size:12px; color:var(--text-soft); letter-spacing:1.5px;}
.sched-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:6px;}
.sday{display:flex; flex-direction:column; align-items:center; gap:6px; padding:9px 3px; border-radius:10px; border:1px solid var(--line); background:rgba(255,255,255,.025);}
.sd-d{font-size:12px; font-weight:700; color:var(--text-soft);}
.sd-t{font-size:11px; color:var(--text);}
.sday.off .sd-t{color:var(--text-soft);}
.sday.live{border-color:rgba(150,195,255,.5); background:rgba(150,180,250,.10);}
.sday.live .sd-t{font-weight:700;}
/* 오른쪽 카드 */
.col-right{display:flex; flex-direction:column; gap:clamp(14px,1.8vw,20px);}
.col-right .m-stage{align-self:center;}
.col-right .m-name{align-self:center;}
.pf-big.av-host{position:relative; z-index:1; width:clamp(148px,17vw,190px); height:auto; aspect-ratio:1; border:3px solid rgba(150,195,255,.5); box-shadow:0 0 22px rgba(120,170,255,.42);}
body.day .pf-big.av-host{border-color:rgba(80,110,200,.45); box-shadow:0 6px 20px rgba(43,58,140,.25);}
.pf-big .av-fb img{width:100%; height:100%; object-fit:cover;}

.col-text.col-mascot{align-self:stretch; border:none; padding:0; background:none; display:flex; flex-direction:column; align-items:center; justify-content:space-between; gap:clamp(8px,1vw,12px); text-align:center;}
.m-stage{position:relative; display:flex; align-items:center; justify-content:center; width:100%;}
.m-moon{position:absolute; width:clamp(168px,20vw,232px); aspect-ratio:1; border-radius:50%; background:radial-gradient(circle, rgba(190,205,255,.16), transparent 70%); box-shadow:0 0 30px rgba(160,180,250,.18);}
.pf-av.av-host{position:relative; z-index:1; width:clamp(146px,17.5vw,206px); height:auto; aspect-ratio:1; border-width:2px; box-shadow:0 0 22px rgba(120,150,240,.32);}
body.day .pf-av.av-host{box-shadow:0 8px 22px rgba(43,58,140,.2);}
.char-img{width:clamp(160px,19vw,214px); height:auto; filter:drop-shadow(0 8px 16px rgba(0,0,0,.42));}
body.day .char-img{filter:drop-shadow(0 8px 16px rgba(43,58,140,.2));}
.m-name{margin-top:2px;}
.m-img{position:relative; z-index:1; width:clamp(170px,22vw,268px); height:auto; filter:drop-shadow(0 10px 22px rgba(0,0,0,.45));}
body.day .m-img{filter:drop-shadow(0 10px 20px rgba(43,58,140,.22));}
.m-name{display:flex; flex-direction:column; align-items:center; gap:3px; line-height:1;}
.m-pills{display:flex; flex-wrap:wrap; justify-content:center; gap:8px;}
.pill{border:1px solid var(--line); border-radius:999px; padding:6px 14px; font-size:clamp(12px,.95vw,13.5px); color:var(--text-soft); background:rgba(255,255,255,.02);}
.pill b{color:var(--text); font-weight:700;}
.dday-pill{border-color:var(--seal); color:var(--seal); font-weight:700;}
.dday-pill .dday{background:none; padding:0; color:var(--seal);}
.col-mascot .tags{justify-content:center; margin-top:0;}
.logo-body{display:flex; flex-direction:column; gap:clamp(7px,1vw,12px);}
.col-logo .av-host.big-av{width:clamp(200px,70%,330px); height:auto; aspect-ratio:1; border-width:2px; box-shadow:0 0 36px rgba(120,150,240,.35);}
body.day .col-logo .av-host.big-av{box-shadow:0 10px 34px rgba(43,58,140,.18);}
.big-name{font-family:var(--katuri); font-size:clamp(44px,6vw,72px); font-weight:900; color:var(--text); letter-spacing:4px; line-height:1; text-shadow:0 0 22px rgba(120,150,240,.25);}
body.day .big-name{text-shadow:none;}
.ear-l{top:-34px; left:30px; width:50px;}
.ear-r{top:-34px; right:30px; width:50px; transform:scaleX(-1);}
.cat-tail{bottom:-44px; right:-14px; width:58px;}
.blk .h{font-size:clamp(20px,2.3vw,27px); color:var(--heading); letter-spacing:.06em; display:flex; align-items:center; gap:11px; margin-bottom:14px;}
.blk .h::before{content:''; width:7px; height:18px; background:var(--main); border-radius:2px; transform:skewX(-12deg); box-shadow:0 0 10px var(--main);}
body.day .blk .h::before{box-shadow:none;}
.quote{font-family:var(--katuri); font-weight:600; font-size:clamp(15px,1.5vw,18px); color:var(--main); line-height:1.7; margin-bottom:12px;}
.bodytext{font-size:clamp(13px,1.05vw,14.5px); line-height:2; color:var(--text-soft); max-width:46ch; letter-spacing:.01em;}
.intro-blk{text-align:center;}
.intro-blk .h{justify-content:center;}
.intro-blk .bodytext{margin-left:auto; margin-right:auto;}
.pf{list-style:none; display:flex; flex-direction:column; gap:11px; margin-top:2px;}
.pf li{display:flex; align-items:baseline; gap:10px; font-size:clamp(13px,1.05vw,14.5px);}
.pf .k{color:var(--text-soft); font-weight:500; white-space:nowrap;}
.pf .lead{flex:1; border-bottom:1px dotted var(--line); transform:translateY(-4px); min-width:14px;}
.pf .v{color:var(--text); font-weight:700; font-family:var(--katuri); white-space:nowrap;}
.dday{margin-left:8px; font-family:var(--pen); font-size:11.5px; font-weight:700; color:#fff; background:var(--main); border-radius:999px; padding:3px 9px; letter-spacing:.02em;}
.pf .dday{margin-left:0; margin-right:7px; flex:none;}
.tags{display:flex; flex-wrap:wrap; gap:7px; margin-top:18px;}
.tag{border:1px solid var(--line); color:var(--heading); border-radius:999px; padding:4px 12px; font-size:12px; font-weight:500; letter-spacing:.02em;}
.social{display:flex; align-items:center; gap:14px; margin-top:18px;}
.social a{color:var(--text-soft); text-decoration:none; font-size:13px; font-weight:600; letter-spacing:.05em; transition:.16s; position:relative;}
.social a:not(:last-child)::after{content:'·'; position:absolute; right:-9px; color:var(--line);}
.social a:hover{color:var(--main);}

.divider{align-self:stretch; width:1px; background:linear-gradient(transparent, var(--line) 12%, var(--line) 88%, transparent); position:relative; margin:clamp(10px,3vh,30px) 0;}
.divider::before,.divider::after{content:''; position:absolute; left:50%; transform:translateX(-50%); width:5px; height:5px; border:1px solid var(--ornament); background:transparent; rotate:45deg;}
.divider::before{top:-2px;} .divider::after{bottom:-2px;}

.col-img{display:flex; align-items:center; justify-content:flex-start; overflow:visible; align-self:center;}
.framepic{position:relative; flex-shrink:0; width:min(700px,41vw); aspect-ratio:4/3; max-width:none; padding:9px; background:var(--mat);
  border:1px solid var(--frame); border-radius:3px;
  box-shadow:0 26px 70px rgba(0,0,0,.5), inset 0 0 0 1px rgba(255,255,255,.05);}
body.day .framepic{box-shadow:0 22px 50px rgba(43,58,140,.22);}
.framepic::before,.framepic::after{content:''; position:absolute; width:16px; height:16px; border:1.5px solid var(--ornament); opacity:.7;}
.framepic::before{top:-1px; left:-1px; border-right:none; border-bottom:none;}
.framepic::after{bottom:-1px; right:-1px; border-left:none; border-top:none;}
.hero-img{width:100%; height:100%; object-fit:cover; display:block; border-radius:2px;}
.seal-strip{position:absolute; top:16px; right:16px; display:flex; flex-direction:column; align-items:center; gap:9px;
  padding:12px 7px 14px; background:linear-gradient(rgba(10,12,32,0), rgba(10,12,32,.28)); border-radius:4px;}
.seal-strip .vname{writing-mode:vertical-rl; text-orientation:upright; font-family:var(--katuri); font-weight:800; font-size:clamp(24px,2.6vw,32px); color:#fff; letter-spacing:.14em; text-shadow:0 2px 10px rgba(0,0,0,.65);}
.seal-strip .enname{writing-mode:vertical-rl; font-size:10px; letter-spacing:.34em; color:rgba(255,255,255,.82); font-weight:600;}
.seal-strip .seal{width:30px; height:30px; background:var(--seal); color:#fff; font-family:var(--katuri); font-size:17px; display:flex; align-items:center; justify-content:center; border-radius:3px; box-shadow:0 3px 9px rgba(192,57,43,.55); margin-top:2px;}

/* 문의 모달 */
.iq-ov{position:fixed; inset:0; background:rgba(8,10,26,.6); display:none; align-items:center; justify-content:center; z-index:600; padding:16px;}
.iq-ov.show{display:flex;}
.iq-modal{background:#171b3c; border:1px solid var(--line); border-radius:18px; width:100%; max-width:420px; padding:24px; box-shadow:0 24px 70px rgba(0,0,0,.6);}
body.day .iq-modal{background:#fbf8f1;}
.iq-title{font-family:var(--katuri); font-size:18px; font-weight:800; color:var(--heading); margin-bottom:4px;}
.iq-desc{font-size:13px; color:var(--text-soft); margin-bottom:16px;}
.iq-input{width:100%; padding:12px 14px; border-radius:11px; border:1px solid var(--line); font-size:14px; outline:none; margin-bottom:10px; font-family:inherit; background:transparent; color:var(--text);}
.iq-input:focus{border-color:var(--main);}
.iq-btns{display:flex; gap:8px; margin-top:6px;}
.iq-btns button{flex:1; padding:12px; border-radius:11px; border:none; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit;}
.iq-send{background:var(--main); color:#fff;} .iq-cancel{background:rgba(150,165,240,.15); color:var(--heading);}

/* fx 폴백(.fxfb 전용. fx.js 있으면 안 돎) */
#fxfb-layer{position:fixed; inset:0; z-index:1; pointer-events:none; overflow:hidden;}
.fxfb{position:absolute; top:-26px; opacity:0; animation:fxfbFall linear infinite;}
@keyframes fxfbFall{0%{transform:translateY(-26px) translateX(0) rotate(0); opacity:0;} 12%{opacity:.7;} 88%{opacity:.55;} 100%{transform:translateY(104vh) translateX(var(--drift,24px)) rotate(220deg); opacity:0;}}
.fxfb-heart{position:fixed; z-index:500; pointer-events:none; transform:translate(-50%,-50%); animation:fxfbPop .95s ease-out forwards;}
@keyframes fxfbPop{0%{opacity:0; transform:translate(-50%,-50%) scale(.4);} 18%{opacity:.9;} 100%{opacity:0; transform:translate(calc(-50% + var(--hx,0px)), calc(-50% - 64px)) scale(1.05);}}

@media (prefers-reduced-motion: reduce){ #fxfb-layer{display:none;} .fxfb-heart{display:none;} .wrap{transition:none;} }


/* ── 페이지 공통: 카테고리 헤더/카드 ── */
.cat-wrap{position:relative; z-index:2; max-width:1080px; margin:0 auto; min-height:100vh;
  display:flex; flex-direction:column; padding:clamp(40px,5.5vh,64px) clamp(40px,6vw,90px) clamp(40px,5.5vh,60px);
  opacity:0; transition:opacity .4s ease;}
body.ready .cat-wrap{opacity:1;}
.cat-wrap.fx-enter{opacity:1; transition:none;}
.kicker{display:flex; align-items:center; gap:12px; margin-top:clamp(20px,3vh,34px);}
.kicker .cat{font-family:var(--katuri); font-size:13px; font-weight:800; letter-spacing:3px; color:var(--main);}
.kicker .date{font-size:11px; letter-spacing:2px; color:var(--text-soft); font-weight:600;}
.headline{font-family:var(--katuri); font-size:clamp(30px,4vw,46px); font-weight:900; color:var(--text); letter-spacing:3px; margin:10px 0 6px; line-height:1.1;}
.byline{font-size:13.5px; color:var(--text-soft); margin-bottom:clamp(20px,3vh,30px); letter-spacing:.01em;}
.panel{background:var(--mat); border:1.4px solid var(--catframe); border-radius:20px; padding:clamp(20px,3vw,30px); position:relative;
  box-shadow:0 18px 44px rgba(8,12,40,.34); backdrop-filter:blur(2px);}
body.day .panel{background:rgba(255,255,255,.72); box-shadow:0 14px 36px rgba(43,58,140,.14);}
.spinner{width:30px; height:30px; border:3px solid var(--line); border-top-color:var(--main); border-radius:50%; animation:spin .8s linear infinite; margin:30px auto;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{text-align:center; padding:40px 16px; color:var(--text-soft);}
.empty-icon{font-size:38px; margin-bottom:10px;}


  .calendar{background:var(--mat); border-radius:16px; border:1.4px solid var(--catframe); overflow:hidden; margin-top:18px;
    box-shadow:0 18px 44px rgba(8,12,40,.34);}
  body.day .calendar{background:rgba(255,255,255,.72); box-shadow:0 14px 36px rgba(43,58,140,.14);}
  .cal-header{display:flex; align-items:center; justify-content:space-between; padding:16px 20px;}
  .cal-title{font-family:var(--katuri); font-size:20px; font-weight:800; color:var(--text); letter-spacing:1px;}
  .cal-nav{width:36px; height:36px; border-radius:50%; border:1.4px solid var(--line); background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:16px; color:var(--text-soft); transition:all .2s;}
  .cal-nav:hover{background:rgba(150,165,240,.14); border-color:var(--main); color:var(--text);}
  .cal-grid{display:grid; grid-template-columns:repeat(7,1fr);}
  .cal-dow{padding:10px 4px; text-align:center; font-size:13px; font-weight:700; color:var(--heading);}
  .cal-dow:first-child{color:#e3617f;} .cal-dow:last-child{color:#5fb8c4;}
  .cal-cell{height:86px; border-top:1px solid var(--line); border-right:1px solid var(--line); padding:5px 5px 6px; position:relative; overflow:hidden; cursor:default;}
  .cal-cell:nth-child(7n){border-right:none;}
  .cal-cell.other{opacity:.3;}
  .cal-cell.has{cursor:pointer;}
  .cal-cell.has:hover{background:rgba(150,165,240,.1);}
  body.day .cal-cell.has:hover{background:rgba(43,58,140,.07);}
  .cal-cell.today{background:rgba(91,127,224,.12);}
  body.day .cal-cell.today{background:rgba(58,74,160,.08);}
  .cal-cell.today .cal-date{background:var(--main); color:#fff; border-radius:50%; width:22px; height:22px; display:inline-flex; align-items:center; justify-content:center;}
  .cal-cell.hl{box-shadow:inset 0 0 0 2px var(--main);}
  .cal-date{font-size:13px; font-weight:700; color:var(--text); padding:1px 3px;}
  .cal-cell:nth-child(7n+1) .cal-date{color:#e3617f;}
  .cal-cell:nth-child(7n) .cal-date{color:#5fb8c4;}
  .ev{font-size:10px; padding:3px 6px; border-radius:6px; margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:600; max-width:100%;}

  /* 일정 8색 — 다크 밤하늘 배경용(은은한 채도) */
  .c-green{background:rgba(64,180,130,.22); color:#7ee0b0;}
  .c-pink{background:rgba(224,90,140,.22); color:#f29ec0;}
  .c-yellow{background:rgba(220,170,40,.2); color:#e8cf6a;}
  .c-orange{background:rgba(220,110,50,.22); color:#f0a878;}
  .c-blue{background:rgba(80,130,220,.24); color:#9ab0ff;}
  .c-purple{background:rgba(150,100,220,.22); color:#c5a9f0;}
  .c-red{background:rgba(200,70,70,.24); color:#f09a9a;}
  .c-gray{background:rgba(160,170,200,.18); color:#aab0d0;}
  /* 라이트(한지) — 파스텔 */
  body.day .c-green{background:#d6f0e4; color:#1f7a52;}
  body.day .c-pink{background:#ffe0eb; color:#d95f7f;}
  body.day .c-yellow{background:#fff0cc; color:#b07d18;}
  body.day .c-orange{background:#ffe0cc; color:#c2611f;}
  body.day .c-blue{background:#d6e8fa; color:#2c6fb0;}
  body.day .c-purple{background:#e8ddf7; color:#7a4fb0;}
  body.day .c-red{background:#ffd9d9; color:#c44;}
  body.day .c-gray{background:#ececed; color:#666;}

  .seclabel{display:flex; align-items:center; gap:12px; margin:clamp(26px,4vh,38px) 0 14px;}
  .seclabel b{font-family:var(--katuri); font-size:17px; font-weight:800; color:var(--text); letter-spacing:1px;}
  .seclabel .ln{flex:1; height:1px; background:var(--line);}
  .up-item{display:flex; align-items:center; gap:14px; padding:14px 16px; border-radius:12px; background:rgba(255,255,255,.025); border:1.2px solid var(--line); margin-bottom:9px; border-left:5px solid var(--main); cursor:pointer; transition:.18s;}
  body.day .up-item{background:rgba(43,58,140,.025);}
  .up-item:hover{transform:translateX(3px); box-shadow:0 6px 18px rgba(8,12,40,.3);}
  .up-date{flex-shrink:0; width:90px;} .up-d1{font-family:var(--katuri); font-size:13px; font-weight:800; color:var(--text);}
  .up-info{flex:1;} .up-title{font-size:15px; font-weight:700; color:var(--text);}
  .up-time{font-size:12px; color:var(--text-soft); margin-top:2px;}
  .up-badge{padding:5px 14px; border-radius:999px; font-size:12px; font-weight:700; flex-shrink:0;}

  .ov{position:absolute; left:0; right:0; background:rgba(8,10,26,.45); display:none; align-items:flex-start; justify-content:center; z-index:500; padding:16px;}
  .ov.show{display:flex;}
  .schmodal{background:#171b3c; border:1px solid var(--line); border-radius:18px; width:100%; max-width:380px; padding:22px; box-shadow:0 20px 60px rgba(0,0,0,.6); animation:pop .2s ease;}
  body.day .schmodal{background:#fbf8f1;}
  @keyframes pop{from{transform:scale(.95); opacity:0;} to{transform:scale(1); opacity:1;}}
  .m-date{font-size:14px; color:var(--text-soft); margin-bottom:6px;}
  .m-badge{display:inline-block; padding:4px 12px; border-radius:999px; font-size:12px; font-weight:700; margin-bottom:14px;}
  .m-part{background:rgba(150,165,240,.12); border-radius:12px; padding:12px 14px; margin-bottom:8px;}
  body.day .m-part{background:rgba(43,58,140,.07);}
  .m-part .pt{font-size:12px; font-weight:700; color:var(--heading);}
  .m-part .pn{font-size:15px; font-weight:600; color:var(--text); margin-top:2px;}
  .m-desc{font-size:13px; color:var(--text-soft); background:rgba(150,165,240,.1); border-radius:12px; padding:11px 14px; margin-bottom:8px; white-space:pre-wrap;}
  body.day .m-desc{background:rgba(43,58,140,.06);}
  .m-close{width:100%; padding:12px; border-radius:12px; border:none; background:var(--main); color:#fff; font-size:14px; font-weight:700; cursor:pointer; margin-top:6px; font-family:inherit;}

  @media(max-width:560px){
    .cal-header{padding:13px 13px;} .cal-title{font-size:17px;} .cal-nav{width:32px; height:32px; font-size:14px;}
    .cal-dow{padding:7px 1px; font-size:11px;} .cal-cell{height:62px; padding:3px 2px 4px;}
    .cal-date{font-size:11px; padding:0 2px;} .cal-cell.today .cal-date{width:18px; height:18px;}
    .ev{font-size:8px; padding:2px 3px; border-radius:4px; margin-top:2px;}
    .up-item{gap:10px; padding:11px 12px;} .up-date{width:76px;} .up-d1{font-size:12px;}
    .up-title{font-size:14px;} .up-badge{padding:4px 11px; font-size:11px;}
  }


/* === 모바일 내비 (공통, 자동삽입) === */
@media (max-width:760px){
  .nav{flex-direction:column; align-items:center; gap:10px;}
  .brandwrap{margin-right:0; justify-content:center;}
  .menu{position:static; transform:none; flex-wrap:wrap; justify-content:center; white-space:normal; gap:4px 4px; width:100%;}
  .ctrls{margin-left:0;}
}
@media (max-width:430px){
  .menu a{padding:6px 10px; font-size:14px;}
  .nav-logo{font-size:22px !important;}
}
</style>
</head>

<div class="ov" id="ov" onclick="if(event.target===this)closeModal()">
  <div class="schmodal" id="modal-body"></div>
</div>
<script>
  let currentYear, currentMonth, allSchedule = [];
  const DAYS = ['일','월','화','수','목','금','토'];
  function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function kind(t){ return t === '휴방' ? 'off' : 'on'; }
  function colorClass(s){ return 'c-' + (s.color || (kind(s.type)==='off'?'pink':'green')); }
  function colorClass2(s){ return 'c-' + (s.color2 || s.color || 'blue'); }
  async function init() {
    const now = new Date(); currentYear = now.getFullYear(); currentMonth = now.getMonth();
    try { if (typeof fetchAll==='function') allSchedule = await fetchAll('schedule', { order: 'date', asc: true }) || []; } catch(e){ console.log('schedule load', e); }
    renderCalendar(); renderUpcoming();
    document.body.classList.add('ready');
    if (typeof initIframeResize==='function') initIframeResize();
  }
  function changeMonth(d) {
    currentMonth += d;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    renderCalendar(); if (typeof initIframeResize==='function') initIframeResize();
  }
  function renderCalendar() {
    document.getElementById('calTitle').textContent = `${currentYear}년 ${currentMonth+1}월`;
    const grid = document.getElementById('calGrid');
    const first = new Date(currentYear, currentMonth, 1);
    const last = new Date(currentYear, currentMonth+1, 0);
    const startDay = first.getDay();
    const today = new Date();
    let html = DAYS.map(d => `<div class="cal-dow">${d}</div>`).join('');
    const prevLast = new Date(currentYear, currentMonth, 0).getDate();
    for (let i = startDay-1; i >= 0; i--) html += `<div class="cal-cell other"><span class="cal-date">${prevLast-i}</span></div>`;
    for (let d = 1; d <= last.getDate(); d++) {
      const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isToday = today.getFullYear()===currentYear && today.getMonth()===currentMonth && today.getDate()===d;
      const events = allSchedule.filter(s => s.date === dateStr);
      const hl = events.some(e=>e.highlight);
      let evHtml = events.map(e => {
        const l1 = (e.time ? e.time+' ' : '') + (e.title || (kind(e.type)==='off'?'휴방':'방송'));
        let chips = `<div class="ev ${colorClass(e)}" title="${esc(l1)}">${esc(l1)}</div>`;
        if (e.title2 || e.time2) {
          const l2 = (e.time2 ? e.time2+' ' : '') + (e.title2 || '2부');
          chips += `<div class="ev ${colorClass2(e)}" title="${esc(l2)}">${esc(l2)}</div>`;
        }
        return chips;
      }).join('');
      const cls = `cal-cell${isToday?' today':''}${events.length?' has':''}${hl?' hl':''}`;
      const click = events.length ? `onclick="openModal('${dateStr}')"` : '';
      html += `<div class="${cls}" ${click}><span class="cal-date">${d}</span>${evHtml}</div>`;
    }
    const totalCells = startDay + last.getDate();
    const rem = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
    for (let i = 1; i <= rem; i++) html += `<div class="cal-cell other"><span class="cal-date">${i}</span></div>`;
    grid.innerHTML = html;
  }
  function renderUpcoming() {
    const today = new Date().toISOString().split('T')[0];
    const upcoming = allSchedule.filter(s => s.date >= today).slice(0, 12);
    const el = document.getElementById('upcoming');
    if (!upcoming.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>다가오는 일정이 없어요</div>'; return; }
    el.innerHTML = upcoming.map(s => {
      const dd = new Date(s.date + 'T00:00:00'); const k = kind(s.type);
      const label = k==='off' ? '휴방' : '방송';
      const p1 = (s.time?s.time+' ':'') + (s.title||label);
      const p2 = (s.title2||s.time2) ? ((s.time2?s.time2+' ':'') + (s.title2||'2부')) : '';
      return `<div class="up-item ${colorClass(s)}" style="border-left-color:currentColor" onclick="openModal('${s.date}')">
        <div class="up-date"><div class="up-d1">${String(dd.getMonth()+1).padStart(2,'0')}-${String(dd.getDate()).padStart(2,'0')} (${DAYS[dd.getDay()]})</div></div>
        <div class="up-info"><div class="up-title">${esc(s.title || label)}</div><div class="up-time">${esc(p1)}${p2?'  ·  '+esc(p2):''}</div></div>
        <span class="up-badge ${colorClass(s)}">${label}</span>
      </div>`;
    }).join('');
  }
  function openModal(dateStr) {
    const events = allSchedule.filter(s => s.date === dateStr);
    if (!events.length) return;
    const dd = new Date(dateStr + 'T00:00:00');
    let html = `<div class="m-date">${dateStr} (${DAYS[dd.getDay()]})</div>`;
    events.forEach(s => {
      const k = kind(s.type);
      html += `<div class="m-badge ${colorClass(s)}">${k==='off'?'휴방':'방송'}</div>`;
      html += `<div class="m-part ${colorClass(s)}"><div class="pt">${s.time?esc(s.time):'1부'}</div><div class="pn">${esc(s.title || (k==='off'?'휴방':'방송'))}</div></div>`;
      if (s.title2 || s.time2) html += `<div class="m-part ${colorClass2(s)}"><div class="pt">${s.time2?esc(s.time2):'2부'}</div><div class="pn">${esc(s.title2||'방송')}</div></div>`;
      if (s.description) html += `<div class="m-desc">${esc(s.description)}</div>`;
    });
    html += `<button class="m-close" onclick="closeModal()">닫기</button>`;
    document.getElementById('modal-body').innerHTML = html;
    const ov = document.getElementById('ov');
    const e = window.event; let y = 200;
    if (e) { y = (e.pageY != null ? e.pageY : (e.clientY||0)); }
    ov.style.top = Math.max(10, y - 80) + 'px';
    ov.classList.add('show');
  }
  function closeModal(){ document.getElementById('ov').classList.remove('show'); }
  init();
  (function(){var M=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];var t=new Date();var s=t.getFullYear()+' · '+M[t.getMonth()]+' '+t.getDate();document.querySelectorAll('.dbox').forEach(function(e){e.textContent=s});})();
</script>
<script>
/* 장식 띠 점 채우기 */
document.querySelectorAll('.band').forEach(function(b){var t='';for(var i=0;i<21;i++)t+='<i></i>';b.innerHTML=t;});

/* 필수③ 다크(주간/야간) — 기본=야간, 토글 시 .day(주간 한지) */
(function(){
  if(localStorage.getItem('theme')==='day') document.body.classList.add('day');
  function refresh(){ document.querySelectorAll('.theme-knob').forEach(function(k){ k.textContent=document.body.classList.contains('day')?'🌙':'☀️'; }); }
  document.querySelectorAll('.theme-switch').forEach(function(sw){ sw.addEventListener('click',function(){
    document.body.classList.toggle('day'); localStorage.setItem('theme', document.body.classList.contains('day')?'day':'night'); refresh();
  }); });
  refresh();
})();

/* 필수② 문의 */
function openInquiry(){ document.getElementById('iq-ov').classList.add('show'); }
function closeInquiry(){ document.getElementById('iq-ov').classList.remove('show'); }
async function sendInquiry(){
  var nick=document.getElementById('iq-nick').value.trim(); if(!nick){ alert('닉네임을 적어주세요'); return; }
  var msg=document.getElementById('iq-msg').value.trim(); if(!msg){ alert('문의 내용을 적어주세요'); return; }
  var ok=false;
  try{ if(typeof insertRow==='function') ok=await insertRow('inquiries',{nickname:nick,message:msg}); else ok='preview'; }catch(e){}
  if(ok){ alert(ok==='preview'?'문의 전송됨 ♥ (미리보기 — 배포본은 DB 저장)':'문의가 전송됐어요! ♥');
    document.getElementById('iq-nick').value=''; document.getElementById('iq-msg').value=''; closeInquiry(); }
  else alert('전송 실패 ㅠㅠ 잠시 후 다시 시도해주세요');
}

/* iframe 높이 자동 (SOOP 삽입 시) */
if(window.parent!==window && typeof initIframeResize==='function'){ window.addEventListener('load',initIframeResize); setTimeout(initIframeResize,800); }

setTimeout(function(){ document.body.classList.add('ready'); }, 1200);
